<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory Playstation | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loginOverlay" class="overlay">
        <div class="login-card">
            <div class="login-header">
                <h2>VICTORY<span>PS</span></h2>
                <p>Silahkan login admin</p>
            </div>
            <div class="login-body">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button onclick="login()">Sign In</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="main-layout" style="display: none;">
        <nav class="navbar">
            <div class="logo">VICTORY<span>PLAYSTATION</span></div>
            <button onclick="logout()" class="btn-logout">Logout Admin</button>
        </nav>

        <div class="content-container">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="label">Unit Aktif</span>
                    <h3 id="statAktif">0</h3>
                </div>
                <div class="stat-card">
                    <span class="label">Estimasi Pendapatan</span>
                    <h3 id="statPendapatan">Rp0</h3>
                </div>
            </div>

            <div class="main-grid">
                <div class="card form-container">
                    <h3>Input Booking</h3>
                    <div class="input-group">
                        <label>Nama Pelanggan</label>
                        <input type="text" id="nama" placeholder="Nama Pelanggan">
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Console</label>
                            <select id="jenisPS">
                                <option value="PS3">PS3 - Rp5k/j</option>
                                <option value="PS4">PS4 - Rp8k/j</option>
                                <option value="PS5">PS5 - Rp15k/j</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Durasi</label>
                            <input type="number" id="durasi" value="1" min="1">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Metode Bayar</label>
                        <select id="metodeBayar">
                            <option value="Cash">Cash</option>
                            <option value="Card/QRIS">Card/QRIS</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="tambahBooking()">Simpan Booking</button>
                </div>

                <div class="card table-container">
                    <h3>Antrean Unit</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>Unit</th>
                                <th>Total</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="listBooking"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
